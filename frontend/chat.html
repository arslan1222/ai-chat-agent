<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Layout ── */
    .chat-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: .6rem;
    }
    .sidebar a {
      display: flex; align-items: center; gap: .6rem;
      padding: .55rem .8rem;
      border-radius: 8px;
      font-size: .88rem;
      color: var(--muted);
      transition: background .15s, color .15s;
    }
    .sidebar a:hover, .sidebar a.active {
      background: var(--card);
      color: var(--text);
    }
    .sidebar .spacer { flex: 1; }

    /* ── Chat area ── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: .75rem;
      max-width: 75%;
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700;
    }
    .msg.user .msg-avatar { background: var(--accent); color: #fff; }
    .msg.assistant .msg-avatar { background: var(--accent2); color: #fff; }

    .msg-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .7rem 1rem;
      font-size: .9rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
    }

    /* Typing indicator */
    .typing .msg-bubble {
      display: flex; gap: 4px; padding: .7rem .9rem;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce .8s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-6px); }
    }

    /* Input area */
    .chat-input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .input-row {
      display: flex;
      gap: .75rem;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      min-height: 44px;
      max-height: 140px;
      resize: none;
      border-radius: 10px;
      padding: .7rem 1rem;
      font-size: .9rem;
      background: var(--card);
    }
    #send-btn {
      width: 44px; height: 44px;
      border-radius: 10px;
      padding: 0;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: .5rem;
      font-size: .78rem;
      color: var(--muted);
    }

    /* Limit banner */
    #limit-banner {
      text-align: center;
      padding: .75rem;
      background: rgba(255,92,92,.1);
      border: 1px solid var(--danger);
      border-radius: 8px;
      margin: 0 1.5rem 1rem;
      font-size: .88rem;
    }
    #limit-banner a { color: var(--accent); font-weight: 500; }

    @media (max-width: 640px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav class="nav">
    <span class="logo">AI <span>Chat</span></span>
    <div class="nav-right">
      <div id="usage-pill" class="usage-pill">0 / 100</div>
      <img id="user-avatar" class="avatar" src="" alt="avatar" style="display:none" />
      <a href="/auth/logout" class="btn btn-ghost" style="font-size:.8rem;padding:.35rem .9rem;">Logout</a>
    </div>
  </nav>

  <div class="chat-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <a href="/chat.html" class="active">💬 Chat</a>
      <a href="/settings.html">⚙️ Settings</a>
      <div class="spacer"></div>
      <a href="#" id="clear-btn">🗑️ Clear history</a>
      <a href="/premium.html">⭐ Go Premium</a>
    </aside>

    <!-- Main chat -->
    <main class="chat-main">
      <div id="limit-banner" class="hidden">
        You've reached your 100 free messages for today.
        <a href="/premium.html">Upgrade to Premium →</a>
      </div>

      <div id="messages">
        <!-- messages injected by JS -->
        <div class="msg assistant">
          <div class="msg-avatar">AI</div>
          <div class="msg-bubble">👋 Hello! I'm your AI assistant powered by GPT-OSS-120B. How can I help you today?</div>
        </div>
      </div>

      <div class="chat-input-area">
        <div class="input-row">
          <textarea id="user-input" placeholder="Type your message" rows="1"></textarea>
          <button id="send-btn" class="btn btn-primary" title="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div class="status-row">
          <span id="status-text">GPT-OSS-120B ready</span>
          <span id="char-count" style="font-family:var(--mono)">0 chars</span>
        </div>
      </div>
    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
