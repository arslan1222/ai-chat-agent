<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat Agent - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }
    .login-card {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .login-card h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: .5rem;
    }
    .login-card h1 span { color: var(--accent); }
    .login-card p {
      color: var(--muted);
      margin-bottom: 2rem;
      line-height: 1.7;
    }
    .google-btn {
      display: inline-flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem 1.6rem;
      background: #fff;
      color: #3c4043;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: box-shadow .2s;
    }
    .google-btn:hover { box-shadow: 0 2px 12px rgba(0,0,0,.35); }
    .google-btn svg { width: 20px; height: 20px; }
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
    }
    .feature {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      font-size: .82rem;
      color: var(--muted);
    }
    .feature .icon { font-size: 1.4rem; display: block; margin-bottom: .4rem; }
    .badge {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: .2rem .75rem;
      font-size: .75rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card card">
      <span class="badge">GPT-OSS-120B Powered</span>
      <h1>AI Chat <span>Agent</span></h1>
      <p>
        A smart conversational AI with WhatsApp &amp; e-commerce integration.
        100 free messages per day - no card needed.
      </p>

      <a href="/auth/login" class="google-btn">
        <!-- Google G logo -->
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </a>

      <div class="features">
        <div class="feature"><span class="icon"></span>GPT-OSS-120B AI</div>
        <div class="feature"><span class="icon"></span>WhatsApp Integration</div>
        <div class="feature"><span class="icon"></span>E-commerce Support</div>
        <div class="feature"><span class="icon"></span>Secure Google Login</div>
      </div>
    </div>
  </div>
</body>
</html>
